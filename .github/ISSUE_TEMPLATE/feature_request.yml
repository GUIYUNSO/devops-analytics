name: 功能建议
description: 提出新功能或改进建议
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题 or 需求
      description: 你遇到了什么问题，或者希望有什么新能力？
      placeholder: 例如：希望能支持分析多个仓库的跨仓依赖关系
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望怎么解决这个问题？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 有没有其他方式可以达到同样效果？
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 单个 Skill
        - 多个 Skill
        - 整体架构
        - 文档
        - 其他
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他上下文、截图、或参考链接
